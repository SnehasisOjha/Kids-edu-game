<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>

    <div class="signup-box">
        <h2>Create Account</h2>

        <form onsubmit="return validateForm()">

            <input type="text" id="name" placeholder="Full Name" required>

            <input type="number" id="age" placeholder="Age" required>

            <input type="email" id="email" placeholder="Email" required>

            <input type="text" id="phone" placeholder="Phone Number" required>

            <input type="password" id="password" placeholder="Password" required>

            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

            <button type="submit">Sign Up</button>
        </form>

        <p id="errorMsg"></p>

        <div class="links">
            <a href="Login.html">Back to Login</a>
        </div>
    </div>

    <script>
        function validateForm() {
            let name = document.getElementById("name").value.trim();
            let age = document.getElementById("age").value;
            let email = document.getElementById("email").value;
            let phone = document.getElementById("phone").value;
            let password = document.getElementById("password").value;
            let confirmPassword = document.getElementById("confirmPassword").value;
            let errorMsg = document.getElementById("errorMsg");

            // Name validation (only letters & spaces)
            let namePattern = /^[A-Za-z ]+$/;
            if (!namePattern.test(name)) {
                errorMsg.style.color = "red";
                errorMsg.innerText = "Enter a valid name (letters only)";
                return false;
            }

            // Age validation
            if (age < 1 || age > 120) {
                errorMsg.style.color = "red";
                errorMsg.innerText = "Enter a valid age";
                return false;
            }

            // Email validation
            let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
            if (!emailPattern.test(email)) {
                errorMsg.style.color = "red";
                errorMsg.innerText = "Enter a valid email";
                return false;
            }

            // Phone validation (10 digits)
            let phonePattern = /^[0-9]{10}$/;
            if (!phonePattern.test(phone)) {
                errorMsg.style.color = "red";
                errorMsg.innerText = "Enter a valid 10-digit phone number";
                return false;
            }

            // Password match
            if (password !== confirmPassword) {
                errorMsg.style.color = "red";
                errorMsg.innerText = "Passwords do not match";
                return false;
            }

            // Success
            errorMsg.style.color = "green";
            errorMsg.innerText = "Signup successful!";

            return true;
        }
    </script>

</body>
</html>
